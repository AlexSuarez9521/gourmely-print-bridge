name: Release

# Triggered by pushing a tag like `v0.1.0`, or manually via the
# workflow dispatch. Builds the Windows MSI installer and uploads it to
# a GitHub Release named after the tag. Customers never see this repo —
# they download the MSI from the GourmelyHub dashboard, which points at
# the Cloudflare R2 mirror this workflow publishes to.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required when running manually."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "stable"

jobs:
  build:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Tauri build emits the MSI to:
      #   src-tauri/target/release/bundle/msi/GourmelyPrint Bridge_<version>_x64_en-US.msi
      # The Let's Encrypt cert is embedded via include_bytes! so no extra
      # resources need wiring into the installer. The updater signature
      # (.msi.sig) is produced when the TAURI_SIGNING_PRIVATE_KEY secret
      # is set — see the Tauri updater plugin docs.
      - name: Build Tauri MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles msi

      - name: List bundle output
        run: dir src-tauri\target\release\bundle\msi
        shell: cmd

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gourmelyprint-bridge-msi
          path: src-tauri/target/release/bundle/msi/*
          retention-days: 30
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download MSI artifact
        uses: actions/download-artifact@v5
        with:
          name: gourmelyprint-bridge-msi
          path: ./release-assets

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.msi
          body: |
            GourmelyPrint Bridge — local print service for GourmelyHub POS.

            ## Install
            1. Download the `.msi` from the assets below.
            2. Run the installer (Windows SmartScreen may warn until the binary is signed — click "More info → Run anyway").
            3. After install, the bridge starts on next login and listens on `wss://localhost.gourmelyhub.busticco.com:8181/print`.

            ## Verify
            From the POS, open the digital receipt modal — a green dot should appear next to "GourmelyPrint Bridge conectado".
