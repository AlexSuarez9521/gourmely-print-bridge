name: Release

# Triggered by pushing a tag like `v0.1.0`, or manually via the
# workflow dispatch. Builds + signs the Windows MSI and publishes a
# GitHub Release with a STABLE-named installer asset.
#
# Customers never see this repo. The GourmelyHub dashboard "Descargar"
# button points at:
#   https://github.com/<repo>/releases/latest/download/GourmelyPrint-Bridge-setup.msi
# which is a direct single-file download (302 → the .msi). The browser
# downloads one file; the customer double-clicks it. No repo, no GitHub
# page, no navigation.
#
# The Tauri auto-updater reads latest.json from the same stable URL.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required when running manually."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: "stable"
  # Stable, version-less installer name so the dashboard download button
  # and the updater manifest can use a permanent /releases/latest/ URL.
  INSTALLER_NAME: "GourmelyPrint-Bridge-setup.msi"

jobs:
  build:
    name: Build + sign Windows MSI
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # `createUpdaterArtifacts: true` in tauri.conf.json makes the build
      # emit `<app>_<version>_x64_en-US.msi` AND a detached updater
      # signature `<...>.msi.sig`, signed with TAURI_SIGNING_PRIVATE_KEY.
      # If WINDOWS_CODE_SIGN_PFX_BASE64 is set (Fase 6), the MSI is also
      # Authenticode-signed to remove the SmartScreen prompt.
      - name: Build + sign Tauri MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles msi

      - name: List bundle output
        run: dir src-tauri\target\release\bundle\msi
        shell: cmd

      - name: Upload MSI + signature artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gourmelyprint-bridge-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download MSI artifacts
        uses: actions/download-artifact@v5
        with:
          name: gourmelyprint-bridge-msi
          path: ./assets

      - name: Resolve tag + version, rename installer to stable name
        id: meta
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # tauri.conf.json version is the source of truth for the manifest.
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          SRC_MSI=$(ls assets/*.msi | head -1)
          SIG=$(ls assets/*.msi.sig | head -1)

          # Copy the built MSI to a stable, version-less name so the
          # dashboard button + updater can use a permanent URL:
          #   /releases/latest/download/GourmelyPrint-Bridge-setup.msi
          # Renaming does not alter the bytes, so the .sig stays valid.
          cp "$SRC_MSI" "assets/${{ env.INSTALLER_NAME }}"
          echo "sig_path=$SIG" >> "$GITHUB_OUTPUT"

      - name: Build updater manifest (latest.json)
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          SIG_CONTENT=$(cat "${{ steps.meta.outputs.sig_path }}")
          # The updater downloads the stable installer from the latest
          # release. Permanent URL — always resolves to the newest MSI.
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/latest/download/${{ env.INSTALLER_NAME }}"
          # pub_date must be RFC3339. Use the tag's commit date so the
          # manifest is reproducible (no Date.now in this repo's tooling).
          PUB_DATE=$(git log -1 --format=%cI)

          python3 - "$VERSION" "$SIG_CONTENT" "$DOWNLOAD_URL" "$PUB_DATE" <<'PY'
          import json, sys
          version, sig, url, pub_date = sys.argv[1:5]
          manifest = {
              "version": version,
              "notes": "See the GitHub release notes for this version.",
              "pub_date": pub_date,
              "platforms": {
                  "windows-x86_64": {"signature": sig, "url": url},
              },
          }
          with open("latest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          PY
          echo "Built latest.json:"
          cat latest.json

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            assets/${{ env.INSTALLER_NAME }}
            assets/*.msi.sig
            latest.json
          body: |
            GourmelyPrint Bridge — local print service for GourmelyHub POS.

            ## Install
            Download from the GourmelyHub dashboard (Configuración → Impresión → Instalar GourmelyPrint Bridge). It downloads a single `${{ env.INSTALLER_NAME }}` — double-click to install.

            ## Auto-update
            Installed bridges check `latest.json` on boot and offer a one-click update — no reinstall needed.
